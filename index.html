<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title -->
    <title>Facebook</title>

    <!-- Icon -->
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Facebook_f_logo_%282019%29.svg/250px-Facebook_f_logo_%282019%29.svg.png">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">

<body>
    <section>

        <!-- Left Aside -->
        <aside id="left">
            <p id="one">facebook</p>
            <p id="two">Facebook helps you build relationships with your fellow human beings.</p>
        </aside>

        <!-- Right Aside -->
        <aside id="right">
            <div>
                <form action="">
                <input type="text" name="" id="text" placeholder="Email or mobile">
                <input type="password" name="" id="password" placeholder="Password">
                <button>Login</button>
                <p id="f-pass">Forget your Password?</p>
                <hr>
                <button id="new">Create a new Account</button>
                </form>
            </div>
            <p id="last"><b>Create a page</b> for a celebrity, brand or business.</p>
        </aside>
    </section>
